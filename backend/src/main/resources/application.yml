spring:
  application:
    name: omnidash-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/omnidash}
    username: ${SPRING_DATASOURCE_USERNAME:omnidash}
    password: ${SPRING_DATASOURCE_PASSWORD:omnidash}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 8
      minimum-idle: 1
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.format_sql: false
      hibernate.jdbc.time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: never

omnidash:
  session:
    ttl-seconds: ${SESSION_TTL_SECONDS:86400}
    cookie-name: omnidash_sid
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  skills:
    # 외부 디렉토리 경로(임계값 핫리로드용). 비워두면 classpath:/skills/thresholds.yml 사용.
    config-path: ${SKILLS_CONFIG_PATH:}
    version: "3.0.0"

logging:
  level:
    root: INFO
    com.omnidash: INFO
    org.flywaydb: INFO
