name: omnidash

services:
  postgres:
    image: postgres:16-alpine
    container_name: omnidash-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-omnidash}
      POSTGRES_USER: ${POSTGRES_USER:-omnidash}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-omnidash}
    ports:
      # 127.0.0.1로만 바인드 — 외부 공개 X, 호스트에서 psql만 가능
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-omnidash} -d ${POSTGRES_DB:-omnidash}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - omnidash-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: omnidash-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-omnidash}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-omnidash}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-omnidash}
      SESSION_TTL_SECONDS: ${SESSION_TTL_SECONDS:-86400}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      SKILLS_CONFIG_PATH: ${SKILLS_CONFIG_PATH:-}
      JAVA_OPTS: ${JAVA_OPTS:--Xms256m -Xmx768m}
    ports:
      # 백엔드는 외부에 직접 노출하지 않는다. frontend Next.js가 /api/* rewrites로 docker 내부망을 통해 호출.
      # 호스트에서 디버깅 시에만 127.0.0.1로 접근 가능.
      - "127.0.0.1:${BACKEND_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - omnidash-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
        # rewrites destination이 빌드 시점에 평가되므로 빌드 ARG로도 전달.
        INTERNAL_API_BASE_URL: ${INTERNAL_API_BASE_URL:-http://backend:8080}
    container_name: omnidash-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
      INTERNAL_API_BASE_URL: ${INTERNAL_API_BASE_URL:-http://backend:8080}
      NODE_ENV: production
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    networks:
      - omnidash-net

networks:
  omnidash-net:
    driver: bridge

volumes:
  postgres_data:
